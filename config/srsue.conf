#####################################################################
# srsRAN 4G - srsUE configuration for 5G NR SA
#
# Used in the POWDER Indoor OTA Lab with NUC + B210 as a software UE
# connecting to the srsRAN Project gNodeB on an X310.
#
# RF frontend:  Ettus USRP B210 (USB3, UHD driver, internal clock)
# NR band:      n78 (3.5 GHz TDD)
# BW:           20 MHz (51 PRBs @ 30 kHz SCS)
# PLMN:         999/99
# IMSI:         __IMSI__  (substituted by setup-ue.sh)
#####################################################################

[rf]
freq_offset        = 0
tx_gain            = 80
rx_gain            = 40
srate              = 23.04e6
nof_antennas       = 1

device_name        = uhd
device_args        = clock=internal,num_recv_frames=128,num_send_frames=128

[rat.eutra]
dl_earfcn          = 0
nof_carriers       = 0

[rat.nr]
bands              = 78
nof_carriers       = 1
max_nof_prb        = 51
nof_prb            = 51
dl_nr_arfcn        = 640000
ssb_nr_arfcn       = 640032
scs                = 30
ssb_scs            = 30

[pcap]
enable             = none
mac_filename       = /tmp/ue_mac.pcap
mac_nr_filename    = /tmp/ue_mac_nr.pcap
nas_filename       = /tmp/ue_nas.pcap

[log]
all_level          = info
phy_lib_level      = none
all_hex_limit      = 32
filename           = /tmp/srsue.log
file_max_size      = -1

[usim]
mode               = soft
algo               = milenage
opc                = 63bfa50ee6523365ff14c1f45f88737d
k                  = 00112233445566778899aabbccddeeff
imsi               = __IMSI__
imei               = 353490069873319

[rrc]
release            = 15
ue_category        = 4

[nas]
apn                = internet
apn_protocol       = ipv4

[gw]
ip_devname         = tun_srsue
