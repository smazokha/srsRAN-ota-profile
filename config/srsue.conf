#####################################################################
# srsRAN 4G - srsUE configuration for 5G NR SA
#
# Used in the POWDER Indoor OTA Lab with NUC + B210 as a software UE
# connecting to the srsRAN Project gNodeB on an X310.
#
# RF frontend:  Ettus USRP B210 (USB3, auto-detected by UHD)
# NR band:      n78 (3.5 GHz TDD)
# DL ARFCN:     640000 (~3600 MHz)
# PLMN:         999/99
# IMSI:         __IMSI__  (substituted by setup-ue.sh)
#####################################################################

[rf]
freq_offset      = 0
tx_gain          = 80
rx_gain          = 40
device_name      = auto
device_args      = auto
srate            = 23.04e6

[rat.eutra]
dl_earfcn        = 0
nof_carriers     = 0

[rat.nr]
bands            = 78
dl_arfcn         = 640000
nof_carriers     = 1

[usim]
mode             = soft
algo             = milenage
opc              = 63bfa50ee6523365ff14c1f45f88737d
k                = 00112233445566778899aabbccddeeff
imsi             = __IMSI__
imei             = 353490069873319

[nas]
apn              = internet
apn_protocol     = ipv4
force_imsi_attach = false

[gw]
netns            =
ip_devname       = tun_srsue

[log]
filename         = /tmp/srsue.log
all_level        = info
phy_level        = warning
radio_level      = warning

[pcap]
enable           = false
filename         = /tmp/srsue.pcap
nas_enable       = false
nas_filename     = /tmp/srsue_nas.pcap
