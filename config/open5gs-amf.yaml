# Open5GS AMF configuration for srsRAN 5G POWDER profile
# This is a template - __VARIABLES__ are substituted at deploy time.

logger:
  file: /var/log/open5gs/amf.log
  level: info

global:
  max:
    ue: 1024

amf:
  sbi:
    server:
      - address: 127.0.0.5
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

  ngap:
    server:
      - address: __AMF_ADDR__

  metrics:
    server:
      - address: 127.0.0.5
        port: 9090

  guami:
    - plmn_id:
        mcc: "998"
        mnc: "98"
      amf_id:
        region: 2
        set: 1

  tai:
    - plmn_id:
        mcc: "998"
        mnc: "98"
      tac: 1

  plmn_support:
    - plmn_id:
        mcc: "998"
        mnc: "98"
      s_nssai:
        - sst: 1

  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]

  network_name:
    full: POWDER 5G Test Network
    short: POWDER5G

  amf_name: open5gs-amf0

  time:
    t3512:
      value: 540
