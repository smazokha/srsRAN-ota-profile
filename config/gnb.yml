# srsRAN Project gNodeB configuration for POWDER Indoor OTA Lab
# Hardware: NI USRP X310 (ota-x310-2) with UBX160 daughterboard
# Band: n78 (TDD, 3.5 GHz), 20 MHz, DL ARFCN 640000 (~3600 MHz centre)
# PLMN: 999/99 (MCC=999, MNC=99)
# AMF/UPF: Open5GS running co-located on the same d430 compute node

cu_cp:
  amf:
    addr: 127.0.0.5
    port: 38412
    bind_addr: 0.0.0.0
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "99999"
            tai_slice_support_list:
              - sst: 1

cu_up:
  ngu:
    socket:
      - bind_addr: 127.0.0.1    # gNB GTP-U (N3) bind — avoids port 2152 conflict with UPF on 127.0.0.7

ru_sdr:
  device_driver: uhd
  device_args: type=x300,addr=192.168.40.2,master_clock_rate=184.32e6,send_frame_size=8000,recv_frame_size=8000
  srate: 23.04
  otw_format: sc16
  tx_gain: 31
  rx_gain: 40

cell_cfg:
  dl_arfcn: 640000
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "99999"
  tac: 1
  pci: 1
  pdcch:
    common:
      ss0_index: 0
      coreset0_index: 12
  prach:
    prach_config_index: 1

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
