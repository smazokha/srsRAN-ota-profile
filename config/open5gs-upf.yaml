# Open5GS UPF configuration for srsRAN 5G POWDER profile
# This is a template - __VARIABLES__ are substituted at deploy time.

logger:
  file: /var/log/open5gs/upf.log
  level: info

global:
  max:
    ue: 1024

upf:
  pfcp:
    server:
      - address: 127.0.0.7

  gtpu:
    server:
      - address: __UPF_ADDR__

  session:
    - subnet: 10.45.0.0/16
      dnn: internet
      dev: ogstun
    - subnet: 10.46.0.0/16
      dnn: ims
      dev: ogstun2

  metrics:
    server:
      - address: 127.0.0.7
        port: 9090
