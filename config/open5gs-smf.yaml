# Open5GS SMF configuration for srsRAN 5G POWDER profile

logger:
  file: /var/log/open5gs/smf.log
  level: info

global:
  max:
    ue: 1024

smf:
  sbi:
    server:
      - address: 127.0.0.4
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

  pfcp:
    server:
      - address: 127.0.0.4
    client:
      upf:
        - address: 127.0.0.7

  gtpc:
    server:
      - address: 127.0.0.4

  gtpu:
    server:
      - address: 127.0.0.4

  metrics:
    server:
      - address: 127.0.0.4
        port: 9090

  session:
    - subnet: 10.45.0.0/16
      dnn: internet
    - subnet: 10.46.0.0/16
      dnn: ims

  dns:
    - 8.8.8.8
    - 8.8.4.4

  mtu: 1400

  ctf:
    enabled: auto

  freeDiameter: /etc/freeDiameter/smf.conf
